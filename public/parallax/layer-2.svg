<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="g2card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fafbff"/>
    </linearGradient>
    <linearGradient id="g2score" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#6366f1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Prospect card 1 (back left) -->
  <g filter="url(#shadow2)" transform="translate(40, 180) rotate(-4)">
    <rect width="440" height="200" rx="20" fill="url(#g2card)"/>
    <rect x="24" y="24" width="52" height="52" rx="14" fill="#eef2ff"/>
    <text x="50" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6366f1">AC</text>
    <rect x="90" y="32" width="180" height="14" rx="3" fill="#0a0a0a"/>
    <rect x="90" y="54" width="140" height="10" rx="3" fill="#9ca3af"/>

    <rect x="320" y="32" width="96" height="28" rx="14" fill="#d1fae5"/>
    <circle cx="334" cy="46" r="5" fill="#10b981"/>
    <text x="344" y="51" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#059669">QUALIFIÉ</text>

    <line x1="24" y1="100" x2="416" y2="100" stroke="#f3f4f6" stroke-width="1"/>

    <rect x="24" y="120" width="80" height="9" rx="3" fill="#9ca3af"/>
    <rect x="24" y="138" width="260" height="11" rx="3" fill="#0a0a0a"/>

    <rect x="24" y="166" width="200" height="20" rx="10" fill="#eef2ff"/>
    <rect x="36" y="172" width="176" height="8" rx="4" fill="url(#g2score)"/>
    <text x="240" y="181" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6366f1">Score 92/100</text>
  </g>

  <!-- Prospect card 3 (back right) -->
  <g filter="url(#shadow2)" transform="translate(720, 200) rotate(5)">
    <rect width="440" height="200" rx="20" fill="url(#g2card)"/>
    <rect x="24" y="24" width="52" height="52" rx="14" fill="#fef3c7"/>
    <text x="50" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#d97706">TB</text>
    <rect x="90" y="32" width="160" height="14" rx="3" fill="#0a0a0a"/>
    <rect x="90" y="54" width="130" height="10" rx="3" fill="#9ca3af"/>

    <rect x="320" y="32" width="96" height="28" rx="14" fill="#fef3c7"/>
    <circle cx="334" cy="46" r="5" fill="#f59e0b"/>
    <text x="344" y="51" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b45309">À RELANCER</text>

    <line x1="24" y1="100" x2="416" y2="100" stroke="#f3f4f6" stroke-width="1"/>

    <rect x="24" y="120" width="80" height="9" rx="3" fill="#9ca3af"/>
    <rect x="24" y="138" width="240" height="11" rx="3" fill="#0a0a0a"/>

    <rect x="24" y="166" width="200" height="20" rx="10" fill="#eef2ff"/>
    <rect x="36" y="172" width="120" height="8" rx="4" fill="url(#g2score)"/>
    <text x="240" y="181" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6366f1">Score 68/100</text>
  </g>

  <!-- Prospect card 2 (front center, big) -->
  <g filter="url(#shadow2)" transform="translate(240, 360)">
    <rect width="720" height="320" rx="24" fill="#ffffff"/>

    <!-- Header -->
    <rect x="32" y="32" width="72" height="72" rx="18" fill="#6366f1"/>
    <text x="68" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#ffffff">ML</text>

    <rect x="124" y="40" width="240" height="18" rx="3" fill="#0a0a0a"/>
    <rect x="124" y="68" width="180" height="12" rx="3" fill="#6b7280"/>
    <rect x="124" y="88" width="120" height="10" rx="3" fill="#9ca3af"/>

    <!-- Score badge top right -->
    <rect x="540" y="32" width="148" height="36" rx="18" fill="#eef2ff"/>
    <circle cx="558" cy="50" r="6" fill="#6366f1"/>
    <text x="572" y="54" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Score IA 94/100</text>

    <!-- Tags row -->
    <g transform="translate(124, 110)">
      <rect width="78" height="22" rx="11" fill="#eef2ff"/>
      <text x="39" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6366f1">SaaS B2B</text>
    </g>
    <g transform="translate(212, 110)">
      <rect width="86" height="22" rx="11" fill="#eef2ff"/>
      <text x="43" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6366f1">50-200 emp.</text>
    </g>
    <g transform="translate(308, 110)">
      <rect width="66" height="22" rx="11" fill="#eef2ff"/>
      <text x="33" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6366f1">Série A</text>
    </g>

    <!-- Divider -->
    <line x1="32" y1="158" x2="688" y2="158" stroke="#f3f4f6" stroke-width="1"/>

    <!-- 3 stats inside card -->
    <g transform="translate(32, 178)">
      <rect width="14" height="14" rx="3" fill="#eef2ff"/>
      <rect x="22" y="3" width="160" height="9" rx="3" fill="#9ca3af"/>
      <rect x="22" y="22" width="100" height="12" rx="3" fill="#0a0a0a"/>
    </g>
    <g transform="translate(252, 178)">
      <rect width="14" height="14" rx="3" fill="#d1fae5"/>
      <rect x="22" y="3" width="120" height="9" rx="3" fill="#9ca3af"/>
      <rect x="22" y="22" width="86" height="12" rx="3" fill="#0a0a0a"/>
    </g>
    <g transform="translate(472, 178)">
      <rect width="14" height="14" rx="3" fill="#fef3c7"/>
      <rect x="22" y="3" width="140" height="9" rx="3" fill="#9ca3af"/>
      <rect x="22" y="22" width="110" height="12" rx="3" fill="#0a0a0a"/>
    </g>

    <!-- CTA buttons -->
    <g transform="translate(32, 248)">
      <rect width="200" height="46" rx="23" fill="#6366f1"/>
      <text x="100" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Générer un email IA</text>
    </g>
    <g transform="translate(244, 248)">
      <rect width="160" height="46" rx="23" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="80" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0a0a0a">Voir la fiche</text>
    </g>
    <g transform="translate(416, 248)">
      <rect width="140" height="46" rx="23" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <text x="70" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0a0a0a">Exporter CSV</text>
    </g>
  </g>
</svg>
