<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="g1card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f7ff"/>
    </linearGradient>
    <linearGradient id="g1bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g1line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g1fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6366f1" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg1)"/>

  <!-- Grille de points subtile -->
  <g opacity="0.35">
    <pattern id="dots1" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#c7d2fe"/>
    </pattern>
    <rect width="1600" height="900" fill="url(#dots1)"/>
  </g>

  <!-- Sidebar -->
  <g filter="url(#shadow1)">
    <rect x="40" y="60" width="220" height="780" rx="20" fill="#ffffff"/>
    <!-- Logo SA -->
    <rect x="72" y="92" width="40" height="40" rx="10" fill="#6366f1"/>
    <text x="92" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff">SA</text>
    <text x="124" y="118" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0a0a0a">Sales Advisor</text>

    <!-- Menu items -->
    <rect x="72" y="170" width="156" height="40" rx="10" fill="#eef2ff"/>
    <circle cx="90" cy="190" r="6" fill="#6366f1"/>
    <rect x="106" y="184" width="90" height="12" rx="3" fill="#6366f1"/>

    <rect x="72" y="220" width="156" height="40" rx="10" fill="transparent"/>
    <circle cx="90" cy="240" r="6" fill="#d1d5db"/>
    <rect x="106" y="234" width="70" height="12" rx="3" fill="#9ca3af"/>

    <rect x="72" y="270" width="156" height="40" rx="10" fill="transparent"/>
    <circle cx="90" cy="290" r="6" fill="#d1d5db"/>
    <rect x="106" y="284" width="100" height="12" rx="3" fill="#9ca3af"/>

    <rect x="72" y="320" width="156" height="40" rx="10" fill="transparent"/>
    <circle cx="90" cy="340" r="6" fill="#d1d5db"/>
    <rect x="106" y="334" width="60" height="12" rx="3" fill="#9ca3af"/>

    <rect x="72" y="370" width="156" height="40" rx="10" fill="transparent"/>
    <circle cx="90" cy="390" r="6" fill="#d1d5db"/>
    <rect x="106" y="384" width="86" height="12" rx="3" fill="#9ca3af"/>
  </g>

  <!-- Top bar -->
  <g filter="url(#shadow1)">
    <rect x="300" y="60" width="1260" height="80" rx="20" fill="#ffffff"/>
    <rect x="332" y="90" width="220" height="20" rx="10" fill="#f3f4f6"/>
    <circle cx="346" cy="100" r="5" fill="#9ca3af"/>
    <rect x="360" y="95" width="120" height="10" rx="3" fill="#d1d5db"/>

    <!-- Crédits badge -->
    <rect x="1300" y="86" width="120" height="28" rx="14" fill="#eef2ff"/>
    <circle cx="1318" cy="100" r="5" fill="#6366f1"/>
    <rect x="1332" y="95" width="74" height="10" rx="3" fill="#6366f1"/>

    <!-- Avatar -->
    <circle cx="1500" cy="100" r="22" fill="#6366f1"/>
    <text x="1500" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">VD</text>

    <!-- Avatar group small -->
    <circle cx="1452" cy="100" r="18" fill="#a5b4fc"/>
    <circle cx="1430" cy="100" r="18" fill="#c7d2fe"/>
  </g>

  <!-- Stat cards -->
  <g filter="url(#shadow1)">
    <rect x="300" y="170" width="295" height="140" rx="20" fill="url(#g1card)"/>
    <rect x="324" y="194" width="64" height="10" rx="3" fill="#9ca3af"/>
    <text x="324" y="248" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#0a0a0a">2 418</text>
    <rect x="324" y="266" width="120" height="8" rx="3" fill="#d1fae5"/>
    <text x="324" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">+12,4% vs sem. dernière</text>
    <circle cx="555" cy="206" r="18" fill="#eef2ff"/>
    <rect x="547" y="198" width="16" height="16" rx="3" fill="#6366f1" opacity="0.6"/>
  </g>

  <g filter="url(#shadow1)">
    <rect x="615" y="170" width="295" height="140" rx="20" fill="url(#g1card)"/>
    <rect x="639" y="194" width="80" height="10" rx="3" fill="#9ca3af"/>
    <text x="639" y="248" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#0a0a0a">87,2%</text>
    <rect x="639" y="266" width="100" height="8" rx="3" fill="#d1fae5"/>
    <text x="639" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">+3,1 pts ce mois</text>
    <circle cx="870" cy="206" r="18" fill="#eef2ff"/>
  </g>

  <g filter="url(#shadow1)">
    <rect x="930" y="170" width="295" height="140" rx="20" fill="url(#g1card)"/>
    <rect x="954" y="194" width="70" height="10" rx="3" fill="#9ca3af"/>
    <text x="954" y="248" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#0a0a0a">31s</text>
    <rect x="954" y="266" width="80" height="8" rx="3" fill="#eef2ff"/>
    <text x="954" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1">Temps moyen / prospect</text>
    <circle cx="1185" cy="206" r="18" fill="#eef2ff"/>
  </g>

  <g filter="url(#shadow1)">
    <rect x="1245" y="170" width="315" height="140" rx="20" fill="url(#g1card)"/>
    <rect x="1269" y="194" width="60" height="10" rx="3" fill="#9ca3af"/>
    <text x="1269" y="248" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#0a0a0a">+38%</text>
    <rect x="1269" y="266" width="140" height="8" rx="3" fill="#d1fae5"/>
    <text x="1269" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">Taux de réponse</text>
    <circle cx="1520" cy="206" r="18" fill="#eef2ff"/>
  </g>

  <!-- Bar chart -->
  <g filter="url(#shadow1)">
    <rect x="300" y="340" width="760" height="360" rx="20" fill="#ffffff"/>
    <rect x="324" y="368" width="180" height="14" rx="3" fill="#0a0a0a"/>
    <rect x="324" y="390" width="240" height="10" rx="3" fill="#9ca3af"/>

    <!-- Bars -->
    <g>
      <rect x="340" y="540" width="50" height="120" rx="8" fill="url(#g1bar)" opacity="0.85"/>
      <rect x="410" y="500" width="50" height="160" rx="8" fill="url(#g1bar)" opacity="0.85"/>
      <rect x="480" y="450" width="50" height="210" rx="8" fill="url(#g1bar)" opacity="0.85"/>
      <rect x="550" y="480" width="50" height="180" rx="8" fill="url(#g1bar)" opacity="0.85"/>
      <rect x="620" y="420" width="50" height="240" rx="8" fill="url(#g1bar)" opacity="0.85"/>
      <rect x="690" y="380" width="50" height="280" rx="8" fill="url(#g1bar)"/>
      <rect x="760" y="350" width="50" height="310" rx="8" fill="url(#g1bar)"/>
      <rect x="830" y="320" width="50" height="340" rx="8" fill="url(#g1bar)"/>
      <rect x="900" y="290" width="50" height="370" rx="8" fill="url(#g1bar)"/>
      <rect x="970" y="270" width="50" height="390" rx="8" fill="#4f46e5"/>
    </g>

    <!-- baseline -->
    <line x1="324" y1="670" x2="1040" y2="670" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- Donut + legend -->
  <g filter="url(#shadow1)">
    <rect x="1080" y="340" width="480" height="360" rx="20" fill="#ffffff"/>
    <rect x="1104" y="368" width="200" height="14" rx="3" fill="#0a0a0a"/>
    <rect x="1104" y="390" width="160" height="10" rx="3" fill="#9ca3af"/>

    <!-- Donut -->
    <g transform="translate(1230, 540)">
      <circle r="100" fill="none" stroke="#e5e7eb" stroke-width="28"/>
      <!-- Segments via stroke-dasharray on circle (cumulative) -->
      <circle r="100" fill="none" stroke="#6366f1" stroke-width="28"
              stroke-dasharray="282 628" transform="rotate(-90)"/>
      <circle r="100" fill="none" stroke="#a78bfa" stroke-width="28"
              stroke-dasharray="157 628" stroke-dashoffset="-282" transform="rotate(-90)"/>
      <circle r="100" fill="none" stroke="#c7d2fe" stroke-width="28"
              stroke-dasharray="100 628" stroke-dashoffset="-439" transform="rotate(-90)"/>
      <text y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#0a0a0a">94%</text>
    </g>

    <!-- Legend -->
    <g transform="translate(1380, 480)">
      <circle cx="0" cy="0" r="6" fill="#6366f1"/>
      <rect x="14" y="-5" width="70" height="10" rx="3" fill="#0a0a0a"/>
      <rect x="14" y="9" width="40" height="8" rx="3" fill="#9ca3af"/>

      <circle cx="0" cy="42" r="6" fill="#a78bfa"/>
      <rect x="14" y="37" width="80" height="10" rx="3" fill="#0a0a0a"/>
      <rect x="14" y="51" width="50" height="8" rx="3" fill="#9ca3af"/>

      <circle cx="0" cy="84" r="6" fill="#c7d2fe"/>
      <rect x="14" y="79" width="60" height="10" rx="3" fill="#0a0a0a"/>
      <rect x="14" y="93" width="46" height="8" rx="3" fill="#9ca3af"/>
    </g>
  </g>

  <!-- Voile bas (fade) -->
  <rect x="0" y="700" width="1600" height="200" fill="url(#g1fade)" opacity="0.45"/>
</svg>
