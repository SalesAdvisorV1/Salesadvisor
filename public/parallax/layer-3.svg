<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="g3card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fafbff"/>
    </linearGradient>
    <linearGradient id="g3send" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#6366f1" flood-opacity="0.30"/>
    </filter>
    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Email IA composer card (front layer, big & centered) -->
  <g filter="url(#shadow3)" transform="translate(80, 80)">
    <rect width="740" height="440" rx="28" fill="url(#g3card)"/>

    <!-- Header bar -->
    <g transform="translate(28, 28)">
      <!-- AI badge -->
      <rect width="160" height="36" rx="18" fill="#eef2ff"/>
      <circle cx="22" cy="18" r="9" fill="#6366f1" filter="url(#glow3)"/>
      <path d="M18 18 L22 22 L28 14" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6366f1">Email généré par IA</text>

      <!-- Status -->
      <g transform="translate(540, 0)">
        <rect width="140" height="36" rx="18" fill="#d1fae5"/>
        <circle cx="18" cy="18" r="5" fill="#10b981"/>
        <text x="30" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#059669">PRÊT À ENVOYER</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="28" y1="92" x2="712" y2="92" stroke="#f3f4f6" stroke-width="1"/>

    <!-- À : Marie Lefèvre -->
    <g transform="translate(28, 108)">
      <text font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9ca3af">À</text>
      <g transform="translate(20, -14)">
        <rect width="200" height="28" rx="14" fill="#f9fafb"/>
        <circle cx="16" cy="14" r="9" fill="#6366f1"/>
        <text x="16" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">ML</text>
        <text x="32" y="18" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Marie Lefèvre · CMO</text>
      </g>
    </g>

    <!-- Objet -->
    <g transform="translate(28, 148)">
      <text font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9ca3af">Objet</text>
      <text x="44" y="0" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0a0a0a">Booster la conversion de TechFlow de 38 %</text>
    </g>

    <!-- Divider -->
    <line x1="28" y1="174" x2="712" y2="174" stroke="#f3f4f6" stroke-width="1"/>

    <!-- Body lines -->
    <g transform="translate(28, 196)" fill="#374151">
      <rect width="60" height="11" rx="3" fill="#9ca3af"/>
      <rect y="22" width="640" height="10" rx="3" fill="#374151"/>
      <rect y="40" width="620" height="10" rx="3" fill="#374151"/>
      <rect y="58" width="540" height="10" rx="3" fill="#374151"/>

      <rect y="86" width="660" height="10" rx="3" fill="#374151"/>
      <rect y="104" width="600" height="10" rx="3" fill="#374151"/>
      <rect y="122" width="480" height="10" rx="3" fill="#374151"/>

      <!-- Highlighted personalization -->
      <rect y="148" width="380" height="22" rx="6" fill="#eef2ff"/>
      <rect x="6" y="154" width="368" height="10" rx="3" fill="#6366f1"/>
    </g>

    <!-- Footer / CTA bar -->
    <g transform="translate(28, 384)">
      <!-- Variantes -->
      <rect width="118" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <circle cx="18" cy="18" r="4" fill="#6366f1"/>
      <text x="30" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">3 variantes</text>

      <g transform="translate(132, 0)">
        <rect width="98" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
        <text x="49" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Régénérer</text>
      </g>

      <!-- Send button -->
      <g transform="translate(516, 0)">
        <rect width="168" height="36" rx="18" fill="url(#g3send)"/>
        <text x="84" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Envoyer l'email</text>
      </g>
    </g>
  </g>
</svg>
